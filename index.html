<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بنك تمكين المركزي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0f2447;
      --navy-mid:    #1a3a6b;
      --navy-light:  #1e4d8c;
      --gold:        #c9a227;
      --gold-light:  #e8c04a;
      --gold-pale:   #fdf3d7;
      --white:       #ffffff;
      --bg:          #f0f4fb;
      --card-bg:     rgba(255,255,255,0.92);
      --text-main:   #0f2447;
      --text-muted:  #64748b;
      --border:      rgba(201,162,39,0.18);
      --shadow-sm:   0 2px 12px rgba(15,36,71,0.08);
      --shadow-md:   0 8px 30px rgba(15,36,71,0.13);
      --shadow-lg:   0 16px 50px rgba(15,36,71,0.18);
      --radius:      18px;
      --radius-sm:   10px;
      --transition:  all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      direction: rtl;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
      padding: 0 2.5rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 24px rgba(15,36,71,0.35);
      border-bottom: 2px solid var(--gold);
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text .brand { color: var(--gold-light); font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px; }
    .logo-text .sub   { color: rgba(255,255,255,0.6); font-size: 0.68rem; font-weight: 400; }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      z-index: 1;
    }

    .nav-links a {
      color: rgba(255,255,255,0.82);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      position: relative;
    }

    .nav-links a i { font-size: 0.78rem; }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--gold-light);
      background: rgba(201,162,39,0.12);
    }

    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: 0; left: 0;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }

    .header-badge {
      z-index: 1;
      background: rgba(201,162,39,0.15);
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 20px;
      padding: 0.3rem 0.75rem;
      color: var(--gold-light);
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .pulse-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      50%      { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
    }

    /* ===== CONTAINER ===== */
    .container {
      flex: 1;
      min-height: 0;
      max-width: 1140px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ===== PAGE SYSTEM ===== */
    .page { flex: 1; display: none; animation: fadeIn 0.4s ease; }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .section-title h2 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--navy);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-title h2 i { color: var(--gold); }

    /* ===== HOME ===== */
    .home-hero {
      text-align: center;
      padding: 1rem 0 2.5rem;
    }

    .home-hero .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold-pale);
      border: 1px solid rgba(201,162,39,0.3);
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.35rem 1rem;
      border-radius: 30px;
      margin-bottom: 1.25rem;
    }

    .home-hero h2 {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--navy);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .home-hero h2 span { color: var(--gold); }

    .home-hero p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 520px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .stat-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.9rem;
      font-size: 1.4rem;
    }

    .stat-icon.blue   { background: #dbeafe; color: #1d4ed8; }
    .stat-icon.gold   { background: var(--gold-pale); color: var(--gold); }
    .stat-icon.green  { background: #dcfce7; color: #16a34a; }

    .stat-value { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1; }
    .stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.3rem; font-weight: 500; }

    /* Home Nav Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.2rem;
    }

    .card-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.2rem 1.6rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card-btn::before {
      content: '';
      position: absolute;
      top: 0; right: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .card-btn:hover::before { transform: scaleX(1); }

    .card-btn:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(201,162,39,0.35);
    }

    .card-btn.coming-soon {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .card-btn.coming-soon:hover { transform: none; box-shadow: var(--shadow-sm); }

    .card-icon-wrap {
      width: 64px; height: 64px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.7rem;
      transition: var(--transition);
    }

    .card-btn:hover .card-icon-wrap { transform: scale(1.1) rotate(-4deg); }

    .icon-navy  { background: #dbeafe; color: var(--navy-mid); }
    .icon-gold  { background: var(--gold-pale); color: var(--gold); }
    .icon-purple{ background: #f3e8ff; color: #7c3aed; }
    .icon-pink  { background: #fce7f3; color: #be185d; }
    .icon-teal  { background: #ccfbf1; color: #0d9488; }
    .icon-green { background: #dcfce7; color: #15803d; }

    .card-btn h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 0.3rem;
    }

    .card-btn .card-desc {
      font-size: 0.76rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .coming-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      margin-top: 0.4rem;
    }

    /* ===== STUDENTS PAGE ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-header h2 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .page-header h2 i { color: var(--gold); }

    .student-count {
      background: var(--gold-pale);
      border: 1px solid rgba(201,162,39,0.25);
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Podium */
    .podium-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .podium-card {
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow-sm);
      flex: 1;
      max-width: 220px;
      transition: var(--transition);
    }

    .podium-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

    .podium-card.first {
      border-top: 3px solid #f59e0b;
      padding-top: 2rem;
      background: linear-gradient(135deg, #fffbeb, #fff);
      box-shadow: 0 8px 30px rgba(245,158,11,0.15);
    }

    .podium-card.second { border-top: 3px solid #94a3b8; }
    .podium-card.third  { border-top: 3px solid #cd7f32; }

    .podium-medal { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .podium-name  { font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 0.4rem; }
    .podium-pts   { font-size: 1.4rem; font-weight: 900; color: var(--gold); }
    .podium-pts span { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

    /* Table */
    .table-wrap {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    }

    thead th {
      padding: 1rem 1.2rem;
      color: var(--gold-light);
      font-size: 0.85rem;
      font-weight: 700;
      text-align: right;
    }

    thead th:first-child { text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(201,162,39,0.08);
      transition: var(--transition);
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,162,39,0.05); }

    tbody td {
      padding: 0.85rem 1.2rem;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    tbody td:first-child { text-align: center; }
    tbody .clickable-row { cursor: pointer; font-weight: 700; color: var(--navy-mid); }
    tbody .clickable-row:hover { color: var(--gold); text-decoration: underline; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-weight: 800;
      font-size: 0.82rem;
    }

    .rank-1 { background: #fef3c7; color: #b45309; }
    .rank-2 { background: #f1f5f9; color: #475569; }
    .rank-3 { background: #fde8d8; color: #92400e; }
    .rank-n { background: rgba(15,36,71,0.07); color: var(--navy); }

    .points-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--gold-pale);
      color: var(--gold);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.25rem 0.7rem;
      border-radius
