<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>بنك تمكين | مجموعة العطاء</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0f2447;
  --navy-mid: #1a3a6b;
  --navy-light: #1e4d8c;
  --gold: #c9a227;
  --gold-light: #e8c04a;
  --gold-pale: #fdf3d7;
  --white: #ffffff;
  --bg: #f0f4fb;
  --card-bg: rgba(255,255,255,0.95);
  --text-main: #0f2447;
  --text-muted: #64748b;
  --shadow-sm: 0 2px 12px rgba(15,36,71,0.08);
  --shadow-md: 0 8px 30px rgba(15,36,71,0.13);
  --shadow-lg: 0 20px 60px rgba(15,36,71,0.20);
  --radius: 18px;
  --radius-sm: 10px;
  --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --teal: #14b8a6;
}
html { scroll-behavior: smooth; height: 100%; }
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #e8eef8 0%, #f0f4fb 50%, #e8eef8 100%);
  color: var(--text-main);
  min-height: 100vh;
  direction: rtl;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #0a2240 0%, var(--navy-mid) 60%, #1a5276 100%);
  padding: 0 2rem;
  height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 24px rgba(15,36,71,0.35);
  border-bottom: 2.5px solid var(--teal);
  flex-shrink: 0;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2314b8a6' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 1rem;
  z-index: 1;
}
.logo-icon {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--teal) 0%, #2dd4bf 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; color: white;
  box-shadow: 0 4px 16px rgba(20,184,166,0.4);
}
.logo-text .brand { color: #67e8f9; font-size: 1.15rem; font-weight: 800; }
.logo-text .sub { color: rgba(255,255,255,0.6); font-size: 0.7rem; }
.group-badge {
  background: linear-gradient(135deg, var(--teal) 0%, #2dd4bf 100%);
  color: white;
  padding: 0.4rem 1.2rem;
  border-radius: 50px;
  font-weight: 800;
  font-size: 0.95rem;
  display: flex; align-items: center; gap: 0.4rem;
  z-index: 1;
  box-shadow: 0 4px 16px rgba(20,184,166,0.35);
}

/* MAIN */
main {
  flex: 1;
  padding: 2rem 1.5rem 3rem;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

/* STATS BAR */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1.2rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(20,184,166,0.12);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 4px; height: 100%;
  background: linear-gradient(180deg, var(--teal) 0%, #2dd4bf 100%);
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
}
.stat-icon.teal { background: rgba(20,184,166,0.1); color: var(--teal); }
.stat-icon.blue { background: rgba(30,77,140,0.1); color: var(--navy-light); }
.stat-icon.green { background: rgba(34,197,94,0.1); color: var(--green); }
.stat-icon.purple { background: rgba(139,92,246,0.1); color: #8b5cf6; }
.stat-info .label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.2rem; }
.stat-info .value { font-size: 1.6rem; font-weight: 800; color: var(--text-main); line-height: 1; }
.stat-info .value span { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }

/* SECTION TITLE */
.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.section-title {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--navy);
}
.section-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, rgba(20,184,166,0.4) 0%, transparent 100%);
}

/* LEADERBOARD */
.leaderboard-container {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  border: 1px solid rgba(20,184,166,0.12);
  margin-bottom: 2rem;
}
.leaderboard-header {
  background: linear-gradient(135deg, #0a2240 0%, var(--navy-mid) 100%);
  padding: 1rem 1.5rem;
  display: grid;
  grid-template-columns: 60px 1fr 130px 110px;
  gap: 0.5rem;
  align-items: center;
}
.leaderboard-header span {
  color: #67e8f9;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.student-row {
  display: grid;
  grid-template-columns: 60px 1fr 130px 110px;
  gap: 0.5rem;
  align-items: center;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid rgba(20,184,166,0.08);
  transition: var(--transition);
  position: relative;
}
.student-row:last-child { border-bottom: none; }
.student-row:hover { background: rgba(20,184,166,0.04); }
.student-row.rank-1 { background: linear-gradient(135deg, rgba(20,184,166,0.12) 0%, rgba(45,212,191,0.06) 100%); }
.student-row.rank-2 { background: linear-gradient(135deg, rgba(192,192,192,0.10) 0%, transparent 100%); }
.student-row.rank-3 { background: linear-gradient(135deg, rgba(205,127,50,0.10) 0%, transparent 100%); }

/* RANK BADGE */
.rank-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.9rem;
  flex-shrink: 0;
}
.rank-1 .rank-badge { background: linear-gradient(135deg, var(--teal) 0%, #2dd4bf 100%); color: white; box-shadow: 0 4px 12px rgba(20,184,166,0.4); }
.rank-2 .rank-badge { background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%); color: white; box-shadow: 0 4px 12px rgba(148,163,184,0.4); }
.rank-3 .rank-badge { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); color: white; box-shadow: 0 4px 12px rgba(180,83,9,0.4); }
.rank-badge.normal { background: rgba(15,36,71,0.07); color: var(--text-muted); font-size: 0.85rem; }

/* STUDENT NAME */
.student-name-area { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
.student-avatar {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, #0a5276 0%, #1a5276 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 0.85rem;
  flex-shrink: 0;
}
.student-name { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }

/* PROGRESS BAR */
.progress-area { display: flex; align-items: center; gap: 0.6rem; }
.progress-bar {
  height: 8px;
  background: rgba(15,36,71,0.08);
  border-radius: 50px;
  overflow: hidden;
  flex: 1;
}
.progress-fill {
  height: 100%;
  border-radius: 50px;
  transition: width 1s ease;
}
.progress-text { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }

/* SCORE */
.score-area { text-align: center; }
.score-value { font-size: 1.2rem; font-weight: 800; color: var(--navy); display: block; }
.score-label { font-size: 0.7rem; color: var(--text-muted); }
.score-pill {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.25rem 0.8rem;
  border-radius: 50px;
  font-size: 0.75rem; font-weight: 600;
}
.score-pill.excellent { background: rgba(34,197,94,0.12); color: #16a34a; }
.score-pill.good { background: rgba(245,158,11,0.12); color: #d97706; }
.score-pill.fair { background: rgba(239,68,68,0.12); color: #dc2626; }

/* FOOTER */
footer {
  background: #0a2240;
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 1rem;
  font-size: 0.78rem;
  border-top: 2px solid var(--teal);
  flex-shrink: 0;
}
footer strong { color: #67e8f9; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .leaderboard-header, .student-row {
    grid-template-columns: 48px 1fr 80px;
  }
  .progress-area { display: none; }
  header { padding: 0 1rem; }
  main { padding: 1.2rem 0.75rem 2rem; }
  .stats-bar { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-university"></i></div>
    <div class="logo-text">
      <div class="brand">بنك تمكين المركزي</div>
      <div class="sub">المنصة الرقمية التعليمية</div>
    </div>
  </div>
  <div class="group-badge">
    <i class="fas fa-hand-holding-heart"></i>
    مجموعة العطاء
  </div>
</header>

<main>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <div class="label">عدد الطلاب</div>
        <div class="value">24 <span>طالب</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-coins"></i></div>
      <div class="stat-info">
        <div class="label">أعلى رصيد</div>
        <div class="value">2,400 <span>نقطة</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
      <div class="stat-info">
        <div class="label">متوسط المجموعة</div>
        <div class="value">1,248 <span>نقطة</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple"><i class="fas fa-award"></i></div>
      <div class="stat-info">
        <div class="label">إجمالي النقاط</div>
        <div class="value">29,950 <span>نقطة</span></div>
      </div>
    </div>
  </div>

  <div class="section-header">
    <i class="fas fa-trophy" style="color:var(--teal); font-size:1.1rem;"></i>
    <span class="section-title">ترتيب الطلاب - مجموعة العطاء</span>
    <div class="section-line"></div>
    <span style="font-size:0.8rem; color:var(--text-muted); white-space:nowrap;">الحلقة الابتدائية</span>
  </div>

  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <span>الترتيب</span>
      <span>الطالب</span>
      <span>التقدم</span>
      <span>الرصيد</span>
    </div>
    <div id="students-list"></div>
  </div>

</main>

<footer>
  <strong>بنك تمكين المركزي</strong> &mdash; مجموعة العطاء &mdash; الحلقة الابتدائية &mdash; جميع الحقوق محفوظة
</footer>

<script>
const students = [
  { name: "محمد عبدالرحمن القصير", score: 2400 },
  { name: "عزام ماجد الدوسري", score: 2375 },
  { name: "عبدالعزيز فرحان ال طالب", score: 2200 },
  { name: "نواف فهد المفدى", score: 2125 },
  { name: "تركي عادل العمر", score: 2075 },
  { name: "عبدالرحيم محمد السويد", score: 1975 },
  { name: "عمر محمد الفيغاوي", score: 1975 },
  { name: "فيصل صالح الدبيخي", score: 1425 },
  { name: "صالح وليد السحيباني", score: 1425 },
  { name: "أيوب المنيع", score: 1350 },
  { name: "عبدالعزيز الفارس", score: 1325 },
  { name: "سلمان وليد العريمه", score: 1225 },
  { name: "تيم عبدالرحمن الفهاد", score: 1175 },
  { name: "ضاري عبدالله النغيثر", score: 1150 },
  { name: "معاذ محمد السويد", score: 1150 },
  { name: "عبدالعزيز انس المبرد", score: 1000 },
  { name: "باسل عبد الله المبرد", score: 1000 },
  { name: "محمد عبدالله الفارس", score: 950 },
  { name: "خالد عبدالله النعمي", score: 775 },
  { name: "مهند عبدالعزيز العيبان", score: 675 },
  { name: "ابراهيم محمد الحبيب", score: 650 },
  { name: "عبدالله عبدالعزيز المبرد", score: 575 },
  { name: "عدي عبدالعزيز المبرد", score: 125 },
  { name: "اياد عاصم الحمد", score: 0 }
];

const maxScore = 2500;

function getScoreClass(score) {
  if (score >= 1500) return 'excellent';
  if (score >= 750) return 'good';
  return 'fair';
}
function getScoreLabel(score) {
  if (score >= 1500) return 'ممتاز';
  if (score >= 750) return 'جيد';
  return 'يحتاج تحسين';
}
function getProgressColor(score) {
  if (score >= 1500) return 'linear-gradient(90deg, #14b8a6, #2dd4bf)';
  if (score >= 750) return 'linear-gradient(90deg, #f59e0b, #fbbf24)';
  return 'linear-gradient(90deg, #ef4444, #f87171)';
}
function getInitials(name) {
  const parts = name.trim().split(' ');
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0][0];
}

const container = document.getElementById('students-list');
students.forEach((student, index) => {
  const rank = index + 1;
  const pct = Math.round((student.score / maxScore) * 100);
  const rowClass = rank <= 3 ? `student-row rank-${rank}` : 'student-row';
  const badgeClass = rank <= 3 ? 'rank-badge' : 'rank-badge normal';
  const medal = rank === 1 ? '<i class="fas fa-crown" style="color:#2dd4bf; font-size:1rem;"></i>' : rank === 2 ? '<i class="fas fa-medal" style="color:#94a3b8; font-size:1rem;"></i>' : rank === 3 ? '<i class="fas fa-medal" style="color:#b45309; font-size:1rem;"></i>' : rank;
  const scoreClass = getScoreClass(student.score);
  const scoreLabel = getScoreLabel(student.score);
  const progressColor = getProgressColor(student.score);
  const initials = getInitials(student.name);
  container.innerHTML += `
    <div class="${rowClass}">
      <div class="${badgeClass}">${medal}</div>
      <div class="student-name-area">
        <div class="student-avatar">${initials}</div>
        <div>
          <div class="student-name">${student.name}</div>
          <span class="score-pill ${scoreClass}">${scoreLabel}</span>
        </div>
      </div>
      <div class="progress-area">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%; background:${progressColor};"></div>
        </div>
        <span class="progress-text">${pct}%</span>
      </div>
      <div class="score-area">
        <span class="score-value">${student.score.toLocaleString('ar-SA')}</span>
        <span class="score-label">نقطة</span>
      </div>
    </div>`;
});
</script>
</body>
</html>
