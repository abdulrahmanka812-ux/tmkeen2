<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>بنك تمكين | مجموعة النماء</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--navy: #0f2447;
--navy-mid: #1a3a6b;
--navy-light: #1e4d8c;
--gold: #c9a227;
--gold-light: #e8c04a;
--gold-pale: #fdf3d7;
--white: #ffffff;
--bg: #f0f4fb;
--card-bg: rgba(255,255,255,0.95);
--text-main: #0f2447;
--text-muted: #64748b;
--shadow-sm: 0 2px 12px rgba(15,36,71,0.08);
--shadow-md: 0 8px 30px rgba(15,36,71,0.13);
--shadow-lg: 0 20px 60px rgba(15,36,71,0.20);
--radius: 18px;
--radius-sm: 10px;
--transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
--green: #22c55e;
--yellow: #f59e0b;
--red: #ef4444;
}
html { scroll-behavior: smooth; height: 100%; }
body {
font-family: 'Tajawal', sans-serif;
background: linear-gradient(135deg, #e8eef8 0%, #f0f4fb 50%, #e8eef8 100%);
color: var(--text-main);
min-height: 100vh;
direction: rtl;
display: flex;
flex-direction: column;
}
header {
background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
padding: 0 2rem;
height: 76px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 1000;
box-shadow: 0 4px 24px rgba(15,36,71,0.35);
border-bottom: 2.5px solid var(--gold);
flex-shrink: 0;
}
header::before {
content: '';
position: absolute;
inset: 0;
background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
pointer-events: none;
}
.logo-area { display: flex; align-items: center; gap: 1rem; z-index: 1; }
.logo-icon {
width: 46px; height: 46px;
background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 1.4rem; color: var(--navy);
box-shadow: 0 4px 16px rgba(201,162,39,0.4);
}
.logo-text .brand { color: var(--gold-light); font-size: 1.15rem; font-weight: 800; }
.logo-text .sub { color: rgba(255,255,255,0.6); font-size: 0.7rem; }
.group-badge {
background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
color: var(--navy);
padding: 0.4rem 1.2rem;
border-radius: 50px;
font-weight: 800;
font-size: 0.95rem;
display: flex; align-items: center; gap: 0.4rem;
z-index: 1;
box-shadow: 0 4px 16px rgba(201,162,39,0.35);
}
main { flex: 1; padding: 2rem 1.5rem 3rem; max-width: 1100px; width: 100%; margin: 0 auto; }
.stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
.stat-card {
background: var(--card-bg);
border-radius: var(--radius);
padding: 1.4rem 1.6rem;
display: flex;
align-items: center;
gap: 1rem;
box-shadow: var(--shadow-sm);
border: 1px solid rgba(201,162,39,0.12);
transition: var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.stat-icon.blue { background: rgba(30,77,140,0.12); color: var(--navy-light); }
.stat-icon.gold { background: rgba(201,162,39,0.12); color: var(--gold); }
.stat-icon.green { background: rgba(34,197,94,0.12); color: #16a34a; }
.stat-icon.purple { background: rgba(139,92,246,0.12); color: #7c3aed; }
.stat-info .label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.2rem; }
.stat-info .value { font-size: 1.3rem; font-weight: 800; color: var(--text-main); }
.stat-info .value span { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); }
.section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.section-title { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
.section-line { flex: 1; height: 1px; background: rgba(201,162,39,0.25); }
.leaderboard-container { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid rgba(201,162,39,0.1); overflow: hidden; }
.leaderboard-header {
display: grid;
grid-template-columns: 64px 1fr 180px 120px;
padding: 0.9rem 1.4rem;
background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
color: rgba(255,255,255,0.75);
font-size: 0.8rem;
font-weight: 600;
text-align: center;
}
.leaderboard-header span:nth-child(2) { text-align: right; }
.student-row {
display: grid;
grid-template-columns: 64px 1fr 180px 120px;
padding: 1rem 1.4rem;
align-items: center;
border-bottom: 1px solid rgba(15,36,71,0.05);
transition: var(--transition);
gap: 0.5rem;
}
.student-row:last-child { border-bottom: none; }
.student-row:hover { background: rgba(201,162,39,0.04); }
.student-row.rank-1 { background: linear-gradient(135deg, rgba(251,191,36,0.08) 0%, rgba(201,162,39,0.04) 100%); }
.student-row.rank-2 { background: linear-gradient(135deg, rgba(148,163,184,0.08) 0%, rgba(148,163,184,0.04) 100%); }
.student-row.rank-3 { background: linear-gradient(135deg, rgba(180,83,9,0.08) 0%, rgba(180,83,9,0.04) 100%); }
.rank-badge {
width: 40px; height: 40px;
border-radius: 50%;
background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
display: flex; align-items: center; justify-content: center;
font-weight: 800; font-size: 1rem; color: var(--navy);
margin: 0 auto;
box-shadow: 0 4px 12px rgba(201,162,39,0.35);
}
.rank-badge.rank-2-badge { background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%); color: white; box-shadow: 0 4px 12px rgba(148,163,184,0.4); }
.rank-badge.rank-3-badge { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); color: white; box-shadow: 0 4px 12px rgba(180,83,9,0.4); }
.rank-badge.normal { background: rgba(15,36,71,0.07); color: var(--text-muted); font-size: 0.85rem; }
.student-name-area { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
.student-avatar {
width: 38px; height: 38px;
border-radius: 10px;
background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
display: flex; align-items: center; justify-content: center;
color: white; font-weight: 700; font-size: 0.85rem;
flex-shrink: 0;
}
.student-name { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
.progress-area { display: flex; align-items: center; gap: 0.6rem; }
.progress-bar { height: 8px; background: rgba(15,36,71,0.08); border-radius: 50px; overflow: hidden; flex: 1; }
.progress-fill { height: 100%; border-radius: 50px; transition: width 1s ease; }
.progress-text { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
.score-area { text-align: center; }
.score-value { font-size: 1.2rem; font-weight: 800; color: var(--navy); display: block; }
.score-label { font-size: 0.7rem; color: var(--text-muted); }
.score-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
.score-pill.excellent { background: rgba(34,197,94,0.12); color: #16a34a; }
.score-pill.good { background: rgba(245,158,11,0.12); color: #d97706; }
.score-pill.fair { background: rgba(239,68,68,0.12); color: #dc2626; }
footer { background: var(--navy); color: rgba(255,255,255,0.5); text-align: center; padding: 1rem; font-size: 0.78rem; border-top: 2px solid var(--gold); flex-shrink: 0; }
footer strong { color: var(--gold-light); }
@media (max-width: 640px) {
.leaderboard-header, .student-row { grid-template-columns: 48px 1fr 80px; }
.progress-area { display: none; }
header { padding: 0 1rem; }
main { padding: 1.2rem 0.75rem 2rem; }
.stats-bar { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
}
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-university"></i></div>
    <div class="logo-text">
      <div class="brand">بنك تمكين المركزي</div>
      <div class="sub">المنصة الرقمية التعليمية</div>
    </div>
  </div>
  <div class="group-badge">
    <i class="fas fa-seedling"></i>
    مجموعة النماء
  </div>
</header>
<main>
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <div class="label">عدد الطلاب</div>
        <div class="value">19 <span>طالب</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon gold"><i class="fas fa-coins"></i></div>
      <div class="stat-info">
        <div class="label">أعلى رصيد</div>
        <div class="value">4,525 <span>نقطة</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
      <div class="stat-info">
        <div class="label">متوسط المجموعة</div>
        <div class="value">2,508 <span>نقطة</span></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple"><i class="fas fa-award"></i></div>
      <div class="stat-info">
        <div class="label">إجمالي النقاط</div>
        <div class="value">47,650 <span>نقطة</span></div>
      </div>
    </div>
  </div>
  <div class="section-header">
    <i class="fas fa-trophy" style="color:var(--gold); font-size:1.1rem;"></i>
    <span class="section-title">ترتيب الطلاب - مجموعة النماء</span>
    <div class="section-line"></div>
    <span style="font-size:0.8rem; color:var(--text-muted); white-space:nowrap;">الحلقة الابتدائية</span>
  </div>
  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <span>الترتيب</span>
      <span>الطالب</span>
      <span>التقدم</span>
      <span>الرصيد</span>
    </div>
    <div id="students-list"></div>
  </div>
</main>
<footer>
  <strong>بنك تمكين المركزي</strong> &mdash; مجموعة النماء &mdash; الحلقة الابتدائية &mdash; جميع الحقوق محفوظة
</footer>
<script>
const students = [
  { name: "سعود عبدالله الغنتوخ", score: 4525 },
  { name: "تميم بن بدر النشوان", score: 3575 },
  { name: "ريان أحمد السعد", score: 3525 },
  { name: "فهد محمد الخضير", score: 3525 },
  { name: "الياس سليمان النافع", score: 3500 },
  { name: "أحمد عبدالعزيز الحاتم", score: 3050 },
  { name: "فهد صالح فهد الباهلي", score: 2900 },
  { name: "ليث زياد السويداء", score: 2725 },
  { name: "عمر الأحمد", score: 2625 },
  { name: "سلطان عبدالمجيد الحسين", score: 2600 },
  { name: "مشاري عبدالعزيز الوثلان", score: 2500 },
  { name: "فارس صالح الصغير", score: 2450 },
  { name: "عبدالسلام أحمد السبهان", score: 2350 },
  { name: "بدر العبيد", score: 2050 },
  { name: "فهد المحمدي", score: 2000 },
  { name: "تركي عماد العيدان", score: 1300 },
  { name: "عبدالله عبدالرحمن الهندي", score: 1200 },
  { name: "محمد الوهيب", score: 1050 },
  { name: "فارس حسن الزهراني", score: 200 }
];
const maxScore = 5000;
function getScoreClass(score) {
  if (score >= 3000) return 'excellent';
  if (score >= 1500) return 'good';
  return 'fair';
}
function getScoreLabel(score) {
  if (score >= 3000) return 'ممتاز';
  if (score >= 1500) return 'جيد';
  return 'يحتاج تحسين';
}
function getProgressColor(score) {
  if (score >= 3000) return 'linear-gradient(90deg, #22c55e, #4ade80)';
  if (score >= 1500) return 'linear-gradient(90deg, #f59e0b, #fbbf24)';
  return 'linear-gradient(90deg, #ef4444, #f87171)';
}
function getInitials(name) {
  const parts = name.trim().split(' ');
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0][0];
}
const container = document.getElementById('students-list');
students.forEach((student, index) => {
  const rank = index + 1;
  const pct = Math.round((student.score / maxScore) * 100);
  const rowClass = rank <= 3 ? 'student-row rank-' + rank : 'student-row';
  let badgeClass = 'rank-badge normal';
  let medal = rank.toString();
  if (rank === 1) { badgeClass = 'rank-badge'; medal = '<i class="fas fa-crown" style="color:#fbbf24; font-size:1rem;"></i>'; }
  else if (rank === 2) { badgeClass = 'rank-badge rank-2-badge'; medal = '<i class="fas fa-medal" style="color:white; font-size:1rem;"></i>'; }
  else if (rank === 3) { badgeClass = 'rank-badge rank-3-badge'; medal = '<i class="fas fa-medal" style="color:white; font-size:1rem;"></i>'; }
  const scoreClass = getScoreClass(student.score);
  const scoreLabel = getScoreLabel(student.score);
  const progressColor = getProgressColor(student.score);
  const initials = getInitials(student.name);
  container.innerHTML += '<div class="' + rowClass + '">' +
    '<div class="' + badgeClass + '">' + medal + '</div>' +
    '<div class="student-name-area">' +
      '<div class="student-avatar">' + initials + '</div>' +
      '<div>' +
        '<div class="student-name">' + student.name + '</div>' +
        '<span class="score-pill ' + scoreClass + '">' + scoreLabel + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="progress-area">' +
      '<div class="progress-bar">' +
        '<div class="progress-fill" style="width:' + pct + '%; background:' + progressColor + ';"></div>' +
      '</div>' +
      '<span class="progress-text">' + pct + '%</span>' +
    '</div>' +
    '<div class="score-area">' +
      '<span class="score-value">' + student.score.toLocaleString('ar-SA') + '</span>' +
      '<span class="score-label">نقطة</span>' +
    '</div>' +
  '</div>';
});
</script>
</body>
</html>
